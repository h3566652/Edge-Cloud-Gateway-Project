apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iot-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/h3566652/Edge-Cloud-Gateway-Project
    targetRevision: HEAD
    path: helm/iot-gateway
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
