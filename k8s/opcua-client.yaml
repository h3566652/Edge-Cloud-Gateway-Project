apiVersion: apps/v1
kind: Deployment
metadata:
  name: opcua-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opcua-client
  template:
    metadata:
      labels:
        app: opcua-client
    spec:
      containers:
      - name: opcua-client
        image: kpark30525/iot-gateway:latest
	imagePullPolicy: Always
        command: ["python3", "scripts/opcua_client.py"]
        securityContext:
          privileged: true
	resources:
	  requests:
	    memory: "64Mi"
	    cpu: "100m"
	  limits:
	    memory: "256Mi"
	    cpu: "300m"
	livenessProbe:
	  exec:
	    command:
	    - python3
	    - -c
	    - "import os; os.getpid()"
	  initialDelaySeconds: 30
	  periodSeconds: 30
	  failureThreshold: 3
        envFrom:
        - configMapRef:
            name: iot-gateway-config
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
      volumes:
      - name: certs
        hostPath:
          path: /home/kpark30525/iot-project/certs
          type: Directory
